name: EAS Build (iOS)

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'

jobs:
  build:
    name: Build iOS preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Check Apple credentials exist
        id: check_creds
        run: |
          if [ -z "${{ secrets.APPLE_PROVISIONING_PROFILE }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Apple credentials not yet configured — skipping build. Register Apple Developer account and run 'eas credentials' to unblock."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build iOS (preview)
        if: steps.check_creds.outputs.skip == 'false'
        working-directory: mobile
        run: npx eas-cli build --platform ios --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_ENV: staging
          API_URL: https://nowgo-production.up.railway.app
